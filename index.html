<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoodyMights Museum</title>
  <script>
    fetch('./moody_album_v6.html',{cache:'no-store'})
      .then(r=>r.text())
      .then(html=>{
        document.open();
        document.write(html);
        document.close();
      })
      .catch(()=>{
        document.addEventListener('DOMContentLoaded',()=>{
          const el=document.getElementById('boot');
          if(el)el.textContent='Could not load MoodyMights Museum.';
        });
      });
  </script>
</head>
<body>
  <p id="boot">Loading MoodyMights Museum...</p>
</body>
</html>
